app-id: dev.d4vram.downloadthis
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk

command: downloadthis

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --env=PYTHONPATH=/app/lib/python3.12/site-packages

build-options:
  build-args:
    - --share=network
  env:
    PIP_PREFIX: /app
    PIP_DISABLE_PIP_VERSION_CHECK: '1'

modules:
  - name: python-deps
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app
          tkinterdnd2
          yt-dlp
    sources:
      - type: shell
        commands: []

  - name: downloadthis
    buildsystem: simple
    build-commands:
      - |
        cat > /app/bin/appstream-compose << 'EOF'
        #!/bin/bash
        component=""
        origin="flatpak"
        while [ "$#" -gt 0 ]; do
            arg="$1"
            shift
            case "$arg" in
                --basename=*) component="${arg#--basename=}" ;;
                --basename)
                    component="$1"
                    shift
                    ;;
                --origin=*) origin="${arg#--origin=}" ;;
                --origin)
                    origin="$1"
                    shift
                    ;;
                --prefix=*|--prefix) ;;
                *)
                    if [ -z "$component" ] && [ -n "$arg" ]; then
                        component="$arg"
                    fi
                    ;;
            esac
        done
        component="${component:-dev.d4vram.downloadthis}"
        args=(
            --no-partial-urls
            --prefix=/
            "--origin=$origin"
            --result-root=/app
            --data-dir=/app/share/app-info/xmls
            --icons-dir=/app/share/app-info/icons/flatpak
            "--components=$component"
            /app
        )
        if [ -x /usr/libexec/appstreamcli-compose ]; then
            exec /usr/libexec/appstreamcli-compose "${args[@]}"
        fi
        exec appstreamcli compose "${args[@]}"
        EOF
      - chmod +x /app/bin/appstream-compose
      - install -Dm755 downloadthis_modern.py /app/bin/downloadthis_modern.py
      - |
        cat > /app/bin/downloadthis << 'EOF'
        #!/bin/bash
        exec python3 /app/bin/downloadthis_modern.py "$@"
        EOF
      - chmod +x /app/bin/downloadthis
      - install -Dm644 packaging/linux/dev.d4vram.downloadthis.desktop
            /app/share/applications/dev.d4vram.downloadthis.desktop
      - install -Dm644 packaging/linux/dev.d4vram.downloadthis.appdata.xml
            /app/share/metainfo/dev.d4vram.downloadthis.appdata.xml
      - install -Dm644 packaging/assets/icon128x128.png
            /app/share/icons/hicolor/128x128/apps/dev.d4vram.downloadthis.png
    sources:
      - type: dir
        path: ../..
