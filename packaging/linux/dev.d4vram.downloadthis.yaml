app-id: dev.d4vram.downloadthis
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.python312

command: downloadthis

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --env=PYTHONPATH=/app/lib/python3.12/site-packages

build-options:
  append-path: /usr/lib/sdk/python312/bin
  env:
    PIP_PREFIX: /app
    PIP_DISABLE_PIP_VERSION_CHECK: '1'

modules:
  - name: python-deps
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app
          ttkbootstrap
          tkinterdnd2
          yt-dlp
    sources:
      - type: shell
        commands: []

  - name: downloadthis
    buildsystem: simple
    build-commands:
      - install -Dm755 downloadthis_modern.py /app/bin/downloadthis_modern.py
      - |
        cat > /app/bin/downloadthis << 'EOF'
        #!/bin/bash
        exec python3 /app/bin/downloadthis_modern.py "$@"
        EOF
      - chmod +x /app/bin/downloadthis
      - install -Dm644 packaging/linux/dev.d4vram.downloadthis.desktop
            /app/share/applications/dev.d4vram.downloadthis.desktop
      - install -Dm644 packaging/assets/icon.png
            /app/share/icons/hicolor/256x256/apps/dev.d4vram.downloadthis.png
    sources:
      - type: dir
        path: ../..
