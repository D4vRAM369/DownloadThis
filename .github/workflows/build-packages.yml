name: Build packages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Linux: .deb · .rpm · AppImage · PortableApp ──────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y dpkg-dev fakeroot python3-venv ffmpeg rpm libfuse2

      - name: Install appimagetool
        run: |
          curl -L --fail -o /usr/local/bin/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

      - name: Build .deb
        run: bash packaging/build-deb.sh

      - name: Build AppImage
        run: bash packaging/build-appimage.sh

      - name: Build RPM
        run: bash packaging/build-rpm.sh

      - name: Build Portable tarball + zip
        run: bash packaging/build-portableapp.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-packages
          path: dist/

  # ── Flatpak ───────────────────────────────────────────────────
  build-flatpak:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install flatpak-builder
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        run: bash packaging/build-flatpak.sh

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v6
        with:
          name: flatpak-bundle
          path: dist/*.flatpak

  # ── Windows: NSIS setup.exe · MSI · PortableApp zip ──────────
  build-windows:
    # windows-latest is moving to Windows Server 2025 in 2026, where NSIS is not preinstalled.
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python deps + PyInstaller
        run: pip install pyinstaller tkinterdnd2 yt-dlp

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --onedir \
            --windowed \
            --name downloadthis \
            --icon packaging/icon.ico \
            --add-data "packaging/assets/icon.png;." \
            downloadthis_modern.py

      - name: Build NSIS installer
        shell: cmd
        run: |
          cd packaging\windows
          makensis installer.nsi

      - name: Install WiX Toolset
        shell: powershell
        run: choco install wixtoolset --version 3.14.1.20250415 -y --no-progress

      - name: Build MSI (WiX v3)
        shell: cmd
        run: |
          where heat
          where candle
          where light
          mkdir obj 2>nul
          heat dir dist\downloadthis ^
            -cg AppFiles -gg -scom -sreg -sfrag -srd ^
            -dr INSTALLFOLDER -out obj\AppFiles.wxs
          candle -arch x64 ^
            -dVERSION=1.0.0 ^
            -dICON_ICO=packaging\icon.ico ^
            packaging\windows\installer.wxs obj\AppFiles.wxs ^
            -out obj\
          light -ext WixUIExtension ^
            obj\installer.wixobj obj\AppFiles.wixobj ^
            -out dist\downloadthis-1.0.0-x64.msi

      - name: Build Windows PortableApp zip
        run: |
          VERSION=$(grep -oP "(?<=__version__ = ['\"])[^'\"]*" downloadthis_modern.py | head -1)
          PORTDIR="DownloadThis-${VERSION}-portable"
          mkdir -p "$PORTDIR"
          cp downloadthis_modern.py "$PORTDIR/"
          cp requirements.txt "$PORTDIR/"
          cp packaging/windows/portableapp.bat "$PORTDIR/run.bat"
          cp packaging/windows/portableapp.sh "$PORTDIR/run.sh"
          printf "DownloadThis Portable\n=====================\nRequirements: Python 3.9+, ffmpeg\nWindows: run.bat\nLinux:   ./run.sh\n" > "$PORTDIR/README.txt"
          7z a "dist/${PORTDIR}-win.zip" "$PORTDIR/"
          rm -rf "$PORTDIR"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-packages
          path: dist/

  # ── GitHub Release ────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-flatpak, build-windows]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
